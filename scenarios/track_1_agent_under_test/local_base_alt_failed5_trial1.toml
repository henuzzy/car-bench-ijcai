# Local one-trial regression scenario for five alternate base tasks that failed
# at least once in the first full run, excluding the original hard failed5 set.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm deepseek/deepseek-v4-flash --temperature 0.0 --thinking --reasoning-effort high"

[config]
num_trials = 1
task_split = "test"
user_model = "deepseek/deepseek-v4-flash"
user_provider = "deepseek"
user_thinking = false
policy_evaluator_model = "deepseek/deepseek-v4-flash"
policy_evaluator_provider = "deepseek"
tasks_base_task_id_filter = ["base_19", "base_21", "base_31", "base_65", "base_67"]
max_steps = 20
